<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>热点信息差</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B0E14;color:#E8EDF5;font-family:'Noto Sans SC',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:#58A6FF;text-decoration:none}

/* header 玻璃效果 */
header{background:rgba(22,27,34,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(48,54,61,0.6);position:sticky;top:0;z-index:100}
.header-inner{max-width:720px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#F0F6FC 0%,#58A6FF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-tabs{display:flex;gap:3px;background:rgba(48,54,61,0.3);border-radius:10px;padding:3px}
.header-tabs a{padding:6px 14px;font-size:13px;border-radius:7px;color:#8B949E;white-space:nowrap;transition:all .25s ease}
.header-tabs a.active,.header-tabs a:hover{background:#1F6FEB33;color:#58A6FF}

/* main */
main{max-width:720px;margin:0 auto;padding:16px}
.updated-at{font-size:12px;color:#484F58;text-align:center;padding:0 0 14px;font-weight:400}

/* tag bar */
.tag-bar{display:flex;gap:6px;overflow-x:auto;padding:0 0 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative}
.tag-bar::-webkit-scrollbar{display:none}
.tag-btn{padding:5px 14px;font-size:12px;border-radius:20px;border:1px solid #30363D;background:transparent;color:#8B949E;cursor:pointer;white-space:nowrap;transition:all .2s ease;font-family:inherit;flex-shrink:0}
.tag-btn.active,.tag-btn:hover{background:#1F6FEB33;border-color:#58A6FF;color:#58A6FF;box-shadow:0 0 12px rgba(88,166,255,0.15)}

/* card */
.card{background:linear-gradient(135deg,#161B22 0%,#1A1F27 100%);border:1px solid #30363D;border-radius:12px;padding:18px;margin-bottom:12px;cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#58A6FF,transparent);opacity:0;transition:opacity .35s ease}
.card:hover{transform:translateY(-2px);border-color:#58A6FF44;box-shadow:0 8px 30px rgba(0,0,0,0.3),0 0 20px rgba(88,166,255,0.05)}
.card:hover::before{opacity:1}
.card:active{transform:translateY(0);border-color:#58A6FF88}

.card-time{font-size:12px;color:#484F58;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.card-time .dot{width:5px;height:5px;border-radius:50%;background:#58A6FF;box-shadow:0 0 6px rgba(88,166,255,0.5)}
.card-time .source{color:#58A6FF66;font-size:11px;margin-left:auto}
.card-title{font-size:17px;font-weight:600;margin-bottom:8px;line-height:1.5;color:#F0F6FC;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-summary{font-size:14px;color:#8B949E;margin-bottom:14px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.card-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:linear-gradient(135deg,#1F6FEB22,#1F6FEB11);color:#58A6FF;border:1px solid #58A6FF22;font-weight:500}
.card-stats{display:flex;gap:14px;font-size:12px;color:#484F58}
.card-stats span{display:flex;align-items:center;gap:4px}
.card-stats .num{color:#F0F6FC;font-weight:500}

/* skeleton loading */
.skeleton{background:linear-gradient(90deg,#161B22 25%,#1E2330 50%,#161B22 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:12px;margin-bottom:12px;padding:18px}
.skeleton .s-line{height:12px;background:rgba(48,54,61,0.4);border-radius:6px;margin-bottom:10px}
.skeleton .s-line:first-child{width:35%;height:14px}
.skeleton .s-line:nth-child(2){width:90%}
.skeleton .s-line:nth-child(3){width:70%}
.skeleton .s-line:last-child{width:25%;height:10px;margin-bottom:0}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* inspiration card */
.inspire{background:linear-gradient(135deg,#1A1F2E 0%,#161B22 100%);border:1px solid #30363D;border-radius:12px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.inspire::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#58A6FF,#8B5CF6);opacity:0.6}
.inspire .topic{font-size:14px;color:#8B949E;margin-bottom:8px;padding:4px 10px;background:rgba(88,166,255,0.1);border-radius:6px;display:inline-block}
.inspire h3{font-size:14px;color:#F0F6FC;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.inspire h3 .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.inspire h3 .badge-w{background:#58A6FF22;color:#58A6FF}
.inspire h3 .badge-a{background:#8B5CF622;color:#8B5CF6}
.inspire .suggestion{font-size:13px;color:#C9D1D9;line-height:1.6;padding:6px 0 4px;font-style:italic}
.inspire .source-tag{font-size:11px;color:#484F58;margin-top:6px;display:block}
.inspire+.inspire::before{display:none}

/* fav icon */
.fav-btn{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,0.3);color:#484F58;font-size:16px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px)}
.fav-btn:hover{background:rgba(0,0,0,0.5);transform:scale(1.1)}
.fav-btn.active{color:#F0C040;text-shadow:0 0 8px rgba(240,192,64,0.4)}
.card{position:relative}

/* analysis card */
.analysis-card{background:linear-gradient(135deg,#1A1F2E,#161B22);border:1px solid #30363D;border-radius:12px;padding:18px;margin-bottom:14px}
.analysis-card h3{font-size:15px;color:#F0F6FC;margin-bottom:10px;font-weight:600}
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.analysis-item{background:rgba(48,54,61,0.3);border-radius:8px;padding:10px}
.analysis-item .label{font-size:10px;color:#484F58;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.analysis-item .value{font-size:13px;color:#C9D1D9;line-height:1.5}
.analysis-item .tag-list{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.analysis-item .tag-list span{font-size:11px;padding:2px 8px;border-radius:10px;background:#58A6FF22;color:#58A6FF}
.analysis-tip{background:linear-gradient(90deg,#F0C04011,transparent);border-left:3px solid #F0C040;padding:10px 14px;margin-top:10px;border-radius:0 8px 8px 0;font-size:13px;color:#E8D5CD;line-height:1.6}

/* ai gen */
.ai-card{background:linear-gradient(135deg,#2D1B4E,#1A1F2E);border:1px solid #8B5CF644;border-radius:12px;padding:18px;margin-bottom:14px}
.ai-card .topic{font-size:12px;color:#8B5CF6;margin-bottom:6px;font-weight:500}
.ai-card h4{font-size:14px;color:#F0F6FC;margin-bottom:8px}
.ai-card .ai-suggestion{font-size:13px;color:#C9D1D9;line-height:1.6;padding:8px 12px;background:rgba(139,92,246,0.1);border-radius:8px;margin:6px 0}
.ai-card .ai-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:#8B5CF622;color:#8B5CF6;margin-right:4px}

/* section title */
.section-title{font-size:13px;color:#484F58;margin:0 0 12px;padding:0 4px;font-weight:500;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#30363D,transparent)}
.empty-state{text-align:center;padding:80px 20px;color:#484F58}
.empty-state .icon{font-size:56px;margin-bottom:16px;opacity:0.5}
.empty-state p{font-size:14px;margin-bottom:6px}

/* bottom nav */
.mobile-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(22,27,34,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(48,54,61,0.6);display:flex;z-index:100;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom))}
.mobile-nav a{flex:1;text-align:center;font-size:11px;color:#484F58;padding:8px 0;transition:color .2s}
.mobile-nav a.active{color:#58A6FF}
.mobile-nav a .nav-icon{font-size:20px;display:block;margin-bottom:3px}
body{padding-bottom:70px}
@media(min-width:769px){.mobile-nav{display:none}body{padding-bottom:0}}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#30363D;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484F58}
</style>
</head>
<body>

<header>
<div class="header-inner">
<div class="logo">热点信息差</div>
<div class="header-tabs">
<a href="#" class="active" data-filter="all">精选</a>
<a href="#" data-filter="hot">热点</a>
<a href="#" data-filter="inspire">灵感</a>
<a href="#" data-filter="analysis">拆解</a>
<a href="#" data-filter="fav">收藏</a>
</div>
</div>
</header>

<main>
<div class="updated-at" id="updateTime"></div>
<div class="tag-bar" id="tagBar"></div>
<div id="content">
  <div class="skeleton"><div class="s-line"></div><div class="s-line"></div><div class="s-line"></div><div class="s-line"></div></div>
  <div class="skeleton"><div class="s-line"></div><div class="s-line"></div><div class="s-line"></div><div class="s-line"></div></div>
  <div class="skeleton"><div class="s-line"></div><div class="s-line"></div><div class="s-line"></div><div class="s-line"></div></div>
</div>
</main>

<div class="mobile-nav" id="mobileNav">
<a href="#" class="active" data-filter="all"><span class="nav-icon">🔥</span>精选</a>
<a href="#" data-filter="hot"><span class="nav-icon">📰</span>热点</a>
<a href="#" data-filter="inspire"><span class="nav-icon">💡</span>灵感</a>
<a href="#" data-filter="analysis"><span class="nav-icon">🔬</span>拆解</a>
<a href="#" data-filter="fav"><span class="nav-icon">⭐</span>收藏</a>
</div>

<script>
let data,allTags,json;

fetch('data.json').then(r=>r.json()).then(jsonData=>{
  json=jsonData;
  data=jsonData.articles;
  const tagSet=new Set();
  data.forEach(a=>a.tags.forEach(t=>tagSet.add(t)));
  allTags=['全部',...tagSet];

  // 更新时间
  if(json.updated_at){
    const d=new Date(json.updated_at);
    document.getElementById('updateTime').textContent=
      '更新于 '+d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+
      d.getDate().toString().padStart(2,'0')+' '+
      d.getHours().toString().padStart(2,'0')+':'+
      d.getMinutes().toString().padStart(2,'0');
  }

  renderTags('全部');
  render(data);
}).catch(e=>{
  document.getElementById('content').innerHTML=
    '<div class="empty-state"><div class="icon">📡</div><p>数据加载中...</p><p>请稍后再试</p></div>';
});

function renderTags(active){
  const bar=document.getElementById('tagBar');
  bar.innerHTML=allTags.map(t=>
    `<button class="tag-btn${t===active?' active':''}" data-tag="${t}">${t}</button>`
  ).join('');
  bar.querySelectorAll('.tag-btn').forEach(btn=>{
    btn.onclick=()=>{
      const tag=btn.dataset.tag;
      renderTags(tag);
      const filtered=tag==='全部'?data:data.filter(a=>a.tags.includes(tag));
      render(filtered);
    };
  });
}

function render(items){
  const el=document.getElementById('content');
  if(!items.length){
    el.innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>没有找到相关内容</p></div>';
    return;
  }
  el.innerHTML=items.map(a=>renderCard(a)).join('');
}
function renderCard(a){
  const liked=getLikes().includes(a.id);
  const isBlogger=a.source==='blogger';
  return `<div style="position:relative">
    <button class="fav-btn ${isFav(a.id)?'active':''}" onclick="event.preventDefault();event.stopPropagation();toggleFav(${a.id})">${isFav(a.id)?'⭐':'☆'}</button>
    ${isBlogger?`<button class="fav-btn" style="right:40px;${liked?'background:#F0404022;color:#F04040':'color:#484F58'}" onclick="event.preventDefault();event.stopPropagation();toggleLike(${a.id},${JSON.stringify(a.tags||[]).replace(/'/g,"\\'")})">${liked?'❤️':'🤍'}</button>`:''}
    <a href="${a.url||'#'}" target="_blank" class="card" style="display:block;color:inherit">
      <div class="card-time">
        <span class="dot"></span>${a.date} ${a.time}
        <span class="source">${a.source||''}</span>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-summary">${a.summary||''}</div>
      <div class="card-footer">
        <div class="card-tags">${(a.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
        <div class="card-stats">
          <span>👍 <span class="num">${fmt(a.likes)}</span></span>
          <span>💬 <span class="num">${fmt(a.comments)}</span></span>
        </div>
      </div>
    </a>
    </div>
  `;
}

// fav functions
function getFavs(){try{return JSON.parse(localStorage.getItem('favs')||'[]')}catch{return[]}}
function isFav(id){return getFavs().includes(id)}
function toggleFav(id){let f=getFavs();let i=f.indexOf(id);if(i>-1){f.splice(i,1)}else{f.push(id)};localStorage.setItem('favs',JSON.stringify(f));render(data)}

// 喜欢功能
function getLikes(){try{return JSON.parse(localStorage.getItem('likes')||'[]')}catch{return[]}}
function getLikeTags(){try{return JSON.parse(localStorage.getItem('likeTags')||'[]')}catch{return[]}}
function toggleLike(id,tags){
  let ids=getLikes();let ts=getLikeTags();let i=ids.indexOf(id)
  if(i>-1){ids.splice(i,1);ts=[]}else{ids.push(id);ts=tags||[]}
  localStorage.setItem('likes',JSON.stringify(ids))
  localStorage.setItem('likeTags',JSON.stringify(ts))
  render(data)
}
// 根据喜欢的标签推荐热点
function getRecommended(){
  const likeTags=getLikeTags()
  if(!likeTags.length||!data)return[]
  return data.filter(a=>a.source!=='blogger'&&a.tags.some(t=>likeTags.includes(t))).slice(0,5)
}

function fmt(n){return n>=10000?(n/10000).toFixed(1)+'万':n.toString()}

document.querySelectorAll('.header-tabs a,.mobile-nav a').forEach(a=>{
  a.onclick=e=>{
    e.preventDefault();
    document.querySelectorAll('.header-tabs a,.mobile-nav a').forEach(x=>x.classList.remove('active'));
    a.classList.add('active');
    const filter=a.dataset.filter;
    if(filter==='inspire'){
      renderInspire();
    }else if(filter==='analysis'){
      renderAnalysis();
    }else if(filter==='fav'){
      const el=document.getElementById('content');
      const f=getFavs();
      const favItems=data.filter(a=>f.includes(a.id));
      // 获取今日灵感收藏
      let inspHtml='';
      try{
        const raw=JSON.parse(localStorage.getItem('inspire_favs')||'{}');
        if(raw.date===new Date().toDateString()&&raw.ids.length>0&&json.inspirations){
          const liked=raw.ids.map(i=>json.inspirations[i]).filter(Boolean);
          if(liked.length>0){
            inspHtml='<div class="section-title">今日有趣的灵感 ('+raw.ids.length+')</div>'+
            liked.map(a=>'<div class="inspire"><div class="topic">📌 '+a.topic+'</div><div class="source-tag">来源: '+a.source+'</div><h3><span class="badge badge-w">🏪 网吧信息差风格</span></h3><div class="suggestion">'+a.wangba_style+'</div><h3 style="margin-top:12px"><span class="badge badge-a">🎬 阿七大型纪录片风格</span></h3><div class="suggestion">'+a.aqi_style+'</div></div>').join('');
          }
        }
      }catch(e){}
      const total=f.length+((JSON.parse(localStorage.getItem('inspire_favs')||'{}').ids||[]).length||0);
      if(total===0){
        el.innerHTML='<div class="empty-state"><div class="icon">⭐</div><p>还没有收藏内容</p><p style="font-size:12px">在文章点⭐收藏或在视频点❤️喜欢，会推荐相关热点</p></div>';
      }else{
        renderTags('全部');
        el.innerHTML=inspHtml+'<div class="section-title" style="margin-top:'+(inspHtml?'16px':'0')+'">收藏文章</div>';
        el.innerHTML+=favItems.map((a,i)=>renderCard(a)).join('');
      }
      // 推荐：根据喜欢的视频推荐热点
      const rec=getRecommended();
      const likeCount=getLikes().length;
      if(rec.length>0){
        el.innerHTML+='<div class="section-title" style="margin-top:16px">🔥 猜你喜欢（基于'+(likeCount>0?'你喜欢的视频':'收藏内容')+'）</div>';
        el.innerHTML+=rec.map(a=>renderCard(a)).join('');
      }
    }else{
      renderTags('全部');
      render(data);
    }
  };
});

function renderInspire(){
  const el=document.getElementById('content');
  if(!json.inspirations||!json.inspirations.length){
    el.innerHTML='<div class="empty-state"><div class="icon">💡</div><p>创作灵感加载中...</p></div>';
    return;
  }
  // 每日自动清空灵感收藏
  const today=new Date().toDateString();
  let inspFavs=[];
  try{
    const raw=JSON.parse(localStorage.getItem('inspire_favs')||'{}');
    if(raw.date===today) inspFavs=raw.ids||[];
    else localStorage.setItem('inspire_favs',JSON.stringify({date:today,ids:[]}));
  }catch(e){inspFavs=[]}

  el.innerHTML='<div class="section-title">今日创作灵感 <span style="font-size:11px;color:#484F58;font-weight:400">点击有趣优先推荐</span></div>'+
  json.inspirations.map((a,i)=>{
    const isFaved=inspFavs.includes(i);
    return `
    <div class="inspire" style="${isFaved?'border-color:#F0C040':''}">
      <div class="topic">📌 ${a.topic}</div>
      <div class="source-tag">来源: ${a.source||''}</div>
      <h3><span class="badge badge-w">🏪 网吧信息差风格</span></h3>
      <div class="suggestion">${a.wangba_style}</div>
      <h3 style="margin-top:12px"><span class="badge badge-a">🎬 阿七大型纪录片风格</span></h3>
      <div class="suggestion">${a.aqi_style}</div>
      <button onclick="toggleInspFav(${i})" style="margin-top:10px;padding:4px 14px;border-radius:20px;border:1px solid ${isFaved?'#F0C040':'#30363D'};background:${isFaved?'#F0C04022':'transparent'};color:${isFaved?'#F0C040':'#8B949E'};cursor:pointer;font-size:12px;font-family:inherit">${isFaved?'👍 已标记有趣':'🤔 这个有意思'}</button>
    </div>`}).join('');
}

// 爆款视频拆解
function renderAnalysis(){
  const el=document.getElementById('content');
  const vids=data.filter(a=>a.source==='blogger');
  if(!vids.length){el.innerHTML='<div class="empty-state"><div class="icon">🔬</div><p>暂无视频数据</p></div>';return}
  let h='<div class="section-title">爆款视频拆解分析</div>';
  vids.forEach(v=>{
    const a=v.analysis;
    h+='<div class="analysis-card"><h3>🔍 '+v.title+'</h3><div class="analysis-grid">'
    if(a){h+='<div class="analysis-item"><div class="label">关键词</div><div class="value">'+a.keywords.join(' · ')+'</div></div><div class="analysis-item"><div class="label">视频类型</div><div class="value">'+a.video_type+'</div></div><div class="analysis-item"><div class="label">封面风格</div><div class="value">'+a.cover_style+'</div></div><div class="analysis-item"><div class="label">发布规律</div><div class="value">'+a.publish_pattern+'</div></div><div class="analysis-item" style="grid-column:span 2"><div class="label">热门标签</div><div class="tag-list">'+(v.tags||[]).map(t=>'<span>#'+t+'</span>').join('')+'</div></div>'}
    else{h+='<div class="analysis-item" style="grid-column:span 2"><div class="label">视频信息</div><div class="value">点赞 '+fmt(v.likes)+' · 评论 '+fmt(v.comments)+'</div></div><div class="analysis-item" style="grid-column:span 2"><div class="label">相似选题建议</div><div class="value">可参考此视频风格创作类似内容，加入自己的特色</div></div>'}
    if(a){h+='<div class="analysis-tip">💡 可复制建议：'+a.replicable_tip+'</div>'}
    h+='<div style="margin-top:8px;font-size:11px;color:#484F58">📅 '+v.date+' '+v.time+' · '+v.source+'</div></div>'
  })
  h+='<div class="section-title" style="margin-top:20px">🤖 AI 生成创作建议</div>'

// 灵感有趣标记（每日自动清空）
function toggleInspFav(idx){
  const today=new Date().toDateString();
  let raw;
  try{raw=JSON.parse(localStorage.getItem('inspire_favs')||'{}')}catch(e){raw={}}
  if(raw.date!==today){raw={date:today,ids:[]}}
  const ids=raw.ids||[];
  const i=ids.indexOf(idx);
  if(i>-1){ids.splice(i,1)}else{ids.push(idx)}
  raw.ids=ids;
  localStorage.setItem('inspire_favs',JSON.stringify(raw));
  renderInspire();
}
